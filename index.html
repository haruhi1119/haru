<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COMOLI STOCK</title>
<style>
body{margin:0;background:#f5f5f5;font-family:sans-serif;color:#111}
header{background:#fff;padding:40px 20px;text-align:center;border-bottom:1px solid #ddd}
h1{font-size:56px;letter-spacing:10px;margin:0 0 24px}
input{width:90%;max-width:520px;padding:16px;border:1px solid #ccc;border-radius:12px;font-size:18px}
#products{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:24px;padding:24px}
.card{background:#fff;border-radius:20px;overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.08)}
.card img{width:100%;height:360px;object-fit:cover}
.content{padding:20px}
.brand{color:#777;margin-bottom:8px}
.name{font-size:24px;font-weight:bold;margin-bottom:16px}
.stock{color:green;font-size:22px;font-weight:bold;margin-bottom:18px}
a{display:block;background:#000;color:#fff;text-align:center;text-decoration:none;padding:16px;border-radius:12px}
</style>
</head>
<body>

<header>
  <h1>COMOLI</h1>
  <input id="search" placeholder="ブランド検索">
</header>

<div id="products">読み込み中...</div>

<script>
let allProducts = [];

async function loadProducts(){
  const res = await fetch("./products.json");
  allProducts = await res.json();
  showProducts(allProducts);
}

function showProducts(items){
  const area = document.getElementById("products");
  area.innerHTML = "";

  if(items.length === 0){
    area.innerHTML = "該当商品がありません";
    return;
  }

  items.forEach(item => {
    area.innerHTML += `
      <div class="card">
        <img src="${item.image}">
        <div class="content">
          <div class="brand">${item.brand}</div>
          <div class="name">${item.name}</div>
          <div class="stock">在庫あり ${item.stock}店舗</div>
          <a href="${item.url}" target="_blank">在庫店舗を見る</a>
        </div>
      </div>
    `;
  });
}

document.getElementById("search").addEventListener("input", function(){
  const word = this.value.toLowerCase();

  const result = allProducts.filter(item =>
    item.brand.toLowerCase().includes(word) ||
    item.name.toLowerCase().includes(word)
  );

  showProducts(result);
});

loadProducts();
</script>

</body>
</html>
