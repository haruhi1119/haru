<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BRAND STOCK</title>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:#f5f5f5;
  color:#111;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

header{
  position:sticky;
  top:0;
  z-index:100;
  background:white;
  border-bottom:1px solid #eee;
  padding:36px 18px 20px;
}

.logo{
  text-align:center;
  font-size:42px;
  font-weight:900;
  letter-spacing:4px;
  margin-bottom:18px;
}

.search{
  width:100%;
  border:none;
  background:#f3f3f3;
  border-radius:16px;
  padding:18px;
  font-size:17px;
  outline:none;
}

.filters{
  margin-top:14px;
  display:flex;
  gap:16px;
  align-items:center;
  font-size:13px;
}

.helper{
  margin-top:12px;
  color:#888;
  text-align:center;
  font-size:11px;
}

.container{
  padding:14px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
}

.card{
  background:white;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 2px 10px rgba(0,0,0,.06);
}

.imageWrap{
  position:relative;
}

.card img{
  width:100%;
  aspect-ratio:1/1.25;
  object-fit:cover;
  background:#eee;
}

.stockBadge{
  position:absolute;
  top:10px;
  right:10px;
  background:black;
  color:white;
  padding:6px 10px;
  border-radius:999px;
  font-size:10px;
  font-weight:700;
}

.info{
  padding:14px;
}

.brand{
  font-size:10px;
  color:#888;
  margin-bottom:4px;
  text-transform:uppercase;
}

.name{
  font-size:14px;
  line-height:1.45;
  font-weight:700;
  margin-bottom:10px;
  min-height:44px;
}

.price{
  font-size:20px;
  font-weight:900;
  margin-bottom:12px;
}

.toggle{
  width:100%;
  border:none;
  background:#f4f4f4;
  border-radius:12px;
  padding:12px;
  font-size:13px;
  font-weight:700;
}

.detail{
  display:none;
  margin-top:12px;
}

.detail.open{
  display:block;
}

.store{
  border:1px solid #eee;
  border-radius:14px;
  padding:12px;
  margin-top:12px;
  background:#fafafa;
}

.storeTop{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:10px;
}

.storeName{
  font-size:13px;
  font-weight:800;
}

.hit{
  font-size:11px;
  font-weight:800;
  color:green;
}

.nohit{
  font-size:11px;
  font-weight:800;
  color:#999;
}

.sizes{
  display:flex;
  flex-direction:column;
  gap:6px;
}

.size{
  display:flex;
  justify-content:space-between;
  font-size:12px;
}

.ok{
  color:green;
  font-weight:700;
}

.sold{
  color:#999;
}

.link{
  display:block;
  margin-top:10px;
  text-align:center;
  text-decoration:none;
  background:black;
  color:white;
  border-radius:10px;
  padding:12px;
  font-size:12px;
  font-weight:700;
}

.loading{
  grid-column:1/3;
  padding:120px 20px;
  text-align:center;
}

.spinner{
  width:44px;
  height:44px;
  border:4px solid #ddd;
  border-top:4px solid black;
  border-radius:50%;
  margin:0 auto 16px;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  to{
    transform:rotate(360deg);
  }
}

</style>
</head>

<body>

<header>

<div class="logo">
BRAND STOCK
</div>

<input
  id="search"
  class="search"
  placeholder="ブランド検索"
  value="comoli"
/>

<div class="filters">

<label>

<input
  type="checkbox"
  id="stockOnly"
>

在庫ありのみ

</label>

</div>

<div class="helper">

商品横断在庫検索

</div>

</header>

<div
  id="products"
  class="container"
>

<div class="loading">

<div class="spinner"></div>

Loading...

</div>

</div>

<script>

let allProducts = [];

function normalizeBrand(input){

  const map = {

    "コモリ":"comoli",
    "オーラリー":"auralee",
    "ヘリル":"herill",
    "ブラームス":"blurhms",
    "グラフペーパー":"graphpaper",
    "ヨーク":"yoke",
    "シュタイン":"stein"

  };

  return (
    map[input]
    || input.toLowerCase()
  );

}

function normalizeProductName(name){

  return name
    .toLowerCase()
    .replace(/\s/g,"")
    .replace(/-/g,"")
    .replace(/\//g,"")
    .replace(/_/g,"")
    .replace(/[()]/g,"")
    .replace(/[【】]/g,"")
    .replace(/[・]/g,"");

}

function groupProducts(products){

  const grouped = {};

  products.forEach(product => {

    if(!grouped[product.matchKey]){

      grouped[product.matchKey] = {

        ...product,

        stores:[]

      };

    }

    grouped[product.matchKey]
    .stores
    .push({

      store:"COVERCHORD",

      handle:product.handle,

      sizes:product.sizes,

      hit:true

    });

  });

  return Object.values(grouped);

}

async function loadProducts(brand){

  document
  .getElementById("products")
  .innerHTML = `

<div class="loading">

<div class="spinner"></div>

Loading...

</div>

`;

  const res =
    await fetch(
      `./api/test?store=coverchord&brand=${brand}`
    );

  const data =
    await res.json();

  const products =
    await Promise.all(

      data.products
      .slice(0,30)
      .map(async item => {

        const sizeRes =
          await fetch(
            "./api/product?handle=" +
            item.handle
          );

        const sizeData =
          await sizeRes.json();

        const arkHit =
          await fetch(
            `./api/test?store=arknets&brand=${encodeURIComponent(item.title)}`
          )
          .then(r=>r.json());

        const ciaHit =
          await fetch(
            `./api/test?store=ciacura&brand=${encodeURIComponent(item.title)}`
          )
          .then(r=>r.json());

        const inStock =
          sizeData.sizes.some(
            size => size.available
          );

        return {

          ...item,

          inStock,

          arkHit:
            arkHit.hasBrand,

          ciaHit:
            true,

          matchKey:
            normalizeProductName(
              item.title
            ),

          sizes:
            sizeData.sizes

        };

      })

    );

  allProducts =
    groupProducts(products);

  renderProducts();

}

function renderProducts(){

  const stockOnly =
    document
    .getElementById("stockOnly")
    .checked;

  let products =
    allProducts;

  if(stockOnly){

    products =
      products.filter(
        product => product.inStock
      );

  }

  const html =
    products.map((item,index) => {

      const storesHtml =
        item.stores.map(store => {

          const sizesHtml =
            store.sizes.map(size => {

              return `

<div class="size">

<div>
${size.title}
</div>

<div class="${
  size.available
  ? "ok"
  : "sold"
}">

${
  size.available
  ? "○"
  : "×"
}

</div>

</div>

`;

            }).join("");

          return `

<div class="store">

<div class="storeTop">

<div class="storeName">

${store.store}

</div>

<div class="hit">

HIT ○

</div>

</div>

<div class="sizes">

${sizesHtml}

</div>

<a
class="link"
href="https://coverchord.com/products/${store.handle}"
target="_blank"
>

商品を見る

</a>

</div>

`;

        }).join("");

      return `

<div class="card">

<div class="imageWrap">

<img src="${item.images?.[0]?.src || ''}">

${
  item.inStock
  ? `
<div class="stockBadge">
IN STOCK
</div>
`
  : ""
}

</div>

<div class="info">

<div class="brand">

${item.vendor}

</div>

<div class="name">

${item.title}

</div>

<div class="price">

¥${Number(item.variants?.[0]?.price || 0).toLocaleString()}

</div>

<button
class="toggle"
onclick="toggleDetail(${index})"
>

STORE / SIZE ▼

</button>

<div
id="detail-${index}"
class="detail"
>

${storesHtml}

<div class="store">

<div class="storeTop">

<div class="storeName">

ARKnets

</div>

<div class="${
  item.arkHit
  ? "hit"
  : "nohit"
}">

${
  item.arkHit
  ? "HIT ○"
  : "NO HIT"
}

</div>

</div>

<a
class="link"
href="https://www.google.com/search?q=site:arknets.co.jp+${encodeURIComponent(item.title)}"
target="_blank"
>

ARKnetsで検索

</a>

</div>

<div class="store">

<div class="storeTop">

<div class="storeName">

CIACURA

</div>

<div class="hit">

HIT ○

</div>

</div>

<a
class="link"
href="https://shop.ciacura.jp/search?q=${encodeURIComponent(item.title)}"
target="_blank"
>

CIACURAで検索

</a>

</div>

</div>

</div>

</div>

`;

    }).join("");

  document
  .getElementById("products")
  .innerHTML =
    html;

}

function toggleDetail(index){

  document
  .getElementById(
    "detail-" + index
  )
  .classList
  .toggle("open");

}

document
.getElementById("search")
.addEventListener("change", e => {

  loadProducts(
    normalizeBrand(
      e.target.value.trim()
    )
  );

});

document
.getElementById("search")
.addEventListener("focus", e => {

  e.target.select();

});

document
.getElementById("stockOnly")
.addEventListener("change", () => {

  renderProducts();

});

loadProducts("comoli");

</script>

</body>
</html>
