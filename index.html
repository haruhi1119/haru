<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BRAND STOCK</title>

<style>

body{
  margin:0;
  background:#f5f5f5;
  font-family:sans-serif;
  color:#111;
}

header{
  background:white;
  padding:48px 20px 28px;
  text-align:center;
  border-bottom:1px solid #ddd;
  position:sticky;
  top:0;
  z-index:100;
}

.logo{
  font-size:54px;
  font-weight:900;
  letter-spacing:6px;
  margin-bottom:22px;
}

.search{
  width:100%;
  max-width:700px;
  padding:18px;
  border-radius:18px;
  border:1px solid #ccc;
  font-size:20px;
  box-sizing:border-box;
}

.helper{
  margin-top:12px;
  color:#666;
  font-size:13px;
}

.container{
  padding:16px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
}

.card{
  background:white;
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.card img{
  width:100%;
  aspect-ratio:1/1.2;
  object-fit:cover;
}

.info{
  padding:14px;
}

.brand{
  color:#888;
  font-size:12px;
  margin-bottom:4px;
}

.name{
  font-size:15px;
  font-weight:bold;
  line-height:1.4;
  margin-bottom:10px;
}

.price{
  font-size:18px;
  font-weight:bold;
  margin-bottom:14px;
}

.toggle{
  width:100%;
  border:none;
  background:#f2f2f2;
  border-radius:12px;
  padding:12px;
  text-align:left;
  font-size:13px;
  margin-bottom:10px;
}

.stores{
  display:none;
}

.stores.open{
  display:block;
}

.table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
  font-size:12px;
}

.table th,
.table td{
  border:1px solid #eee;
  padding:8px;
  text-align:center;
}

.ok{
  color:green;
  font-weight:bold;
}

.sold{
  color:#999;
}

.storeButtons{
  margin-top:14px;
}

.storeButton{
  display:block;
  margin-top:8px;
  background:black;
  color:white;
  text-decoration:none;
  text-align:center;
  padding:12px;
  border-radius:12px;
  font-size:13px;
}

.loading{
  text-align:center;
  padding:100px 20px;
  font-size:22px;
}

</style>
</head>

<body>

<header>

<div class="logo">
BRAND STOCK
</div>

<input
  id="search"
  class="search"
  placeholder="ブランド検索"
  value="comoli"
/>

<div class="helper">
商品横断在庫検索
</div>

</header>

<div
  id="products"
  class="container"
>

  <div class="loading">
    商品取得中...
  </div>

</div>

<script>

function normalizeBrand(input){

  const map = {

    "コモリ": "comoli",
    "オーラリー": "auralee",
    "ヘリル": "herill",
    "ブラームス": "blurhms"

  };

  return (
    map[input]
    || input.toLowerCase()
  );

}

async function loadProducts(brand){

  document
  .getElementById("products")
  .innerHTML = `

    <div class="loading">

      ${brand.toUpperCase()}
      を取得中...

    </div>

  `;

  const coverRes =
    await fetch(

      `./api/test?store=coverchord&brand=${brand}`

    );

  const coverData =
    await coverRes.json();

  const cards =
    await Promise.all(

      coverData.products
      .slice(0,12)
      .map(async (item,index) => {

        const sizeRes =
          await fetch(

            "./api/product?handle=" +
            item.handle

          );

        const sizeData =
          await sizeRes.json();

        const sizeRows =
          sizeData.sizes.map(size => {

            return `

              <tr>

                <td>

                  ${size.title}

                </td>

                <td class="${
                  size.available
                  ? "ok"
                  : "sold"
                }">

                  ${
                    size.available
                    ? "○"
                    : "×"
                  }

                </td>

                <td>

                  ?

                </td>

              </tr>

            `;

          }).join("");

        return `

          <div class="card">

            <img src="${item.image}">

            <div class="info">

              <div class="brand">

                ${brand.toUpperCase()}

              </div>

              <div class="name">

                ${item.title}

              </div>

              <div class="price">

                ¥${Number(item.price).toLocaleString()}

              </div>

              <button
                class="toggle"
                onclick="toggleStores(${index})"
              >

                SIZE COMPARISON ▼

              </button>

              <div
                id="stores-${index}"
                class="stores"
              >

                <table class="table">

                  <tr>

                    <th>
                      SIZE
                    </th>

                    <th>
                      COVER
                    </th>

                    <th>
                      ARK
                    </th>

                  </tr>

                  ${sizeRows}

                </table>

                <div class="storeButtons">

                  <a
                    class="storeButton"
                    href="https://coverchord.com/products/${item.handle}"
                    target="_blank"
                  >

                    COVERCHORD

                  </a>

                  <a
                    class="storeButton"
                    href="https://www.arknets.co.jp/goods_list/?keyword=${brand}"
                    target="_blank"
                  >

                    ARKnets

                  </a>

                  <a
                    class="storeButton"
                    href="https://shop.ciacura.jp/search?q=${brand}"
                    target="_blank"
                  >

                    CIACURA

                  </a>

                </div>

              </div>

            </div>

          </div>

        `;

      })

    );

  document
  .getElementById("products")
  .innerHTML =
    cards.join("");

}

function toggleStores(index){

  document
  .getElementById(
    "stores-" + index
  )
  .classList
  .toggle("open");

}

document
.getElementById("search")
.addEventListener("change", e => {

  const input =
    e.target.value.trim();

  const brand =
    normalizeBrand(input);

  loadProducts(brand);

});

loadProducts("comoli");

</script>

</body>
</html>
