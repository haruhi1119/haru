<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BRAND STOCK</title>

<style>

body{
  margin:0;
  background:#f5f5f5;
  font-family:sans-serif;
  color:#111;
}

header{
  background:white;
  padding:48px 20px 28px;
  text-align:center;
  border-bottom:1px solid #ddd;
  position:sticky;
  top:0;
  z-index:100;
}

.logo{
  font-size:54px;
  font-weight:900;
  letter-spacing:6px;
  margin-bottom:22px;
}

.search{
  width:100%;
  max-width:700px;
  padding:18px;
  border-radius:18px;
  border:1px solid #ccc;
  font-size:20px;
  box-sizing:border-box;
}

.helper{
  margin-top:12px;
  color:#666;
  font-size:13px;
}

.storeSection{
  padding:20px 16px 0;
}

.storeTitle{
  font-size:28px;
  font-weight:900;
  margin-bottom:18px;
}

.container{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
}

.card{
  background:white;
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.card img{
  width:100%;
  aspect-ratio:1/1.2;
  object-fit:cover;
}

.info{
  padding:14px;
}

.brand{
  color:#888;
  font-size:12px;
  margin-bottom:4px;
}

.name{
  font-size:15px;
  font-weight:bold;
  line-height:1.4;
  margin-bottom:10px;
}

.price{
  font-size:18px;
  font-weight:bold;
  margin-bottom:14px;
}

.toggle{
  width:100%;
  border:none;
  background:#f2f2f2;
  border-radius:12px;
  padding:12px;
  text-align:left;
  font-size:13px;
  margin-bottom:10px;
}

.sizes{
  display:none;
}

.sizes.open{
  display:block;
}

.size{
  display:flex;
  justify-content:space-between;
  padding:8px 0;
  border-top:1px solid #eee;
  font-size:12px;
}

.ok{
  color:green;
  font-weight:bold;
}

.sold{
  color:#999;
}

.button{
  display:block;
  margin-top:14px;
  background:black;
  color:white;
  text-decoration:none;
  text-align:center;
  padding:14px;
  border-radius:14px;
  font-size:14px;
}

.searchLink{

  display:block;

  background:white;

  padding:20px;

  border-radius:18px;

  text-decoration:none;

  color:black;

  font-weight:bold;

  box-shadow:0 2px 10px rgba(0,0,0,.08);

}

.loading{
  text-align:center;
  padding:100px 20px;
  font-size:22px;
}

</style>
</head>

<body>

<header>

<div class="logo">
BRAND STOCK
</div>

<input
  id="search"
  class="search"
  placeholder="ブランド検索"
  value="comoli"
/>

<div class="helper">
店舗横断検索
</div>

</header>

<div id="app">

  <div class="loading">
    商品取得中...
  </div>

</div>

<script>

const stores = [

  "coverchord",

  "ciacura"

];

function normalizeBrand(input){

  const map = {

    "コモリ": "comoli",
    "オーラリー": "auralee",
    "ヘリル": "herill",
    "ナイスネス": "niceness",
    "ブラームス": "blurhms"

  };

  return (
    map[input]
    || input.toLowerCase()
  );

}

async function loadAllStores(brand){

  document
  .getElementById("app")
  .innerHTML = `

    <div class="loading">

      ${brand.toUpperCase()}
      を検索中...

    </div>

  `;

  let html = "";

  for(const store of stores){

    const res =
      await fetch(

        `./api/test?store=${store}&brand=${brand}`

      );

    const data =
      await res.json();

    if(store === "coverchord"){

      html += `

        <div class="storeSection">

          <div class="storeTitle">

            COVERCHORD

          </div>

          <div class="container">

      `;

      const cards =
        await Promise.all(

          data.products
          .slice(0,6)
          .map(async (item,index) => {

            const sizeRes =
              await fetch(

                "./api/product?handle=" +
                item.handle

              );

            const sizeData =
              await sizeRes.json();

            const sizesHtml =
              sizeData.sizes.map(size => {

                return `

                  <div class="size">

                    <div>
                      ${size.title}
                    </div>

                    <div class="${
                      size.available
                      ? "ok"
                      : "sold"
                    }">

                      ${
                        size.available
                        ? "在庫あり"
                        : "SOLD"
                      }

                    </div>

                  </div>

                `;

              }).join("");

            return `

              <div class="card">

                <img src="${item.image}">

                <div class="info">

                  <div class="brand">

                    COVERCHORD

                  </div>

                  <div class="name">

                    ${item.title}

                  </div>

                  <div class="price">

                    ¥${Number(item.price).toLocaleString()}

                  </div>

                  <button
                    class="toggle"
                    onclick="toggleSizes('${store}-${index}')"
                  >

                    SIZE STOCK ▼

                  </button>

                  <div
                    id="sizes-${store}-${index}"
                    class="sizes"
                  >

                    ${sizesHtml}

                  </div>

                  <a
                    class="button"
                    href="https://coverchord.com/products/${item.handle}"
                    target="_blank"
                  >

                    商品を見る

                  </a>

                </div>

              </div>

            `;

          })

        );

      html += cards.join("");

      html += `

          </div>

        </div>

      `;

    }

    if(store === "ciacura"){

      html += `

        <div class="storeSection">

          <div class="storeTitle">

            CIACURA

          </div>

          <a
            class="searchLink"
            href="${data.searchUrl}"
            target="_blank"
          >

            CIACURAで
            ${brand.toUpperCase()}
            を検索 →

          </a>

        </div>

      `;

    }

  }

  document
  .getElementById("app")
  .innerHTML = html;

}

function toggleSizes(id){

  document
  .getElementById(
    "sizes-" + id
  )
  .classList
  .toggle("open");

}

document
.getElementById("search")
.addEventListener("change", e => {

  const input =
    e.target.value.trim();

  const brand =
    normalizeBrand(input);

  loadAllStores(brand);

});

loadAllStores("comoli");

</script>

</body>
</html>
