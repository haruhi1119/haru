<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BRAND STOCK</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
background:#f5f5f5;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
color:#111;
}

header{
position:sticky;
top:0;
z-index:100;
background:white;
padding:34px 18px 20px;
border-bottom:1px solid #eee;
}

.logo{
text-align:center;
font-size:42px;
font-weight:900;
letter-spacing:4px;
margin-bottom:18px;
}

.search{
width:100%;
border:none;
background:#f3f3f3;
border-radius:16px;
padding:18px;
font-size:17px;
outline:none;
}

.filters{
margin-top:14px;
font-size:13px;
}

.helper{
margin-top:12px;
text-align:center;
font-size:11px;
color:#999;
}

.container{
padding:14px;
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
}

.card{
background:white;
border-radius:22px;
overflow:hidden;
box-shadow:0 2px 10px rgba(0,0,0,.06);
}

.imageWrap{
position:relative;
}

.card img{
width:100%;
aspect-ratio:1/1.25;
object-fit:cover;
background:#eee;
}

.stockBadge{
position:absolute;
top:10px;
right:10px;
background:black;
color:white;
padding:6px 10px;
border-radius:999px;
font-size:10px;
font-weight:700;
}

.info{
padding:14px;
}

.brand{
font-size:10px;
color:#888;
margin-bottom:4px;
text-transform:uppercase;
}

.name{
font-size:15px;
font-weight:800;
line-height:1.45;
margin-bottom:10px;
min-height:46px;
}

.price{
font-size:22px;
font-weight:900;
margin-bottom:12px;
}

.toggle{
width:100%;
border:none;
background:#f4f4f4;
border-radius:14px;
padding:14px;
font-size:13px;
font-weight:800;
}

.detail{
display:none;
margin-top:12px;
}

.detail.open{
display:block;
}

.sizeBlock{
border:1px solid #eee;
border-radius:16px;
padding:12px;
margin-top:12px;
background:#fafafa;
}

.sizeTitle{
font-size:14px;
font-weight:900;
margin-bottom:10px;
}

.storeRow{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 0;
border-top:1px solid #eee;
font-size:13px;
}

.storeRow:first-child{
border-top:none;
padding-top:0;
}

.storeName{
font-weight:800;
}

.ok{
color:green;
font-weight:900;
}

.ng{
color:#aaa;
font-weight:700;
}

.link{
display:block;
margin-top:12px;
padding:12px;
border-radius:12px;
background:black;
color:white;
text-align:center;
text-decoration:none;
font-size:12px;
font-weight:700;
}

.loading{
grid-column:1/3;
padding:120px 20px;
text-align:center;
}

.spinner{
width:44px;
height:44px;
border:4px solid #ddd;
border-top:4px solid black;
border-radius:50%;
margin:0 auto 16px;
animation:spin 1s linear infinite;
}

@keyframes spin{
to{
transform:rotate(360deg);
}
}

</style>
</head>

<body>

<header>

<div class="logo">
BRAND STOCK
</div>

<input
id="search"
class="search"
placeholder="ブランド検索"
value="comoli"
/>

<div class="filters">

<label>

<input
type="checkbox"
id="stockOnly"
>

在庫ありのみ

</label>

</div>

<div class="helper">

サイズ横断在庫検索

</div>

</header>

<div
id="products"
class="container"
>

<div class="loading">

<div class="spinner"></div>

Loading...

</div>

</div>

<script>

let allProducts = [];

function normalizeBrand(input){

const map = {

"コモリ":"comoli",
"オーラリー":"auralee",
"ヘリル":"herill",
"ブラームス":"blurhms",
"グラフペーパー":"graphpaper",
"ヨーク":"yoke",
"シュタイン":"stein"

};

return (
map[input]
|| input.toLowerCase()
);

}

function normalizeProductName(name){

return name
.toLowerCase()
.replace(/\s/g,"")
.replace(/-/g,"")
.replace(/\//g,"")
.replace(/_/g,"")
.replace(/[()]/g,"")
.replace(/[【】]/g,"")
.replace(/[・]/g,"");

}

function createMatchKey(name){

return normalizeProductName(name)
.slice(0,12);

}

function groupProducts(products){

const grouped = {};

products.forEach(product => {

if(!grouped[product.matchKey]){

grouped[product.matchKey] = {

...product,

stores:[]

};

}

grouped[product.matchKey]
.stores
.push({

store:"COVERCHORD",

handle:product.handle,

sizes:product.sizes

});

});

return Object.values(grouped);

}

function buildSizeMatrix(item){

const matrix = {};

item.stores.forEach(store => {

store.sizes.forEach(size => {

if(!matrix[size.title]){

matrix[size.title] = [];

}

matrix[size.title].push({

store:store.store,

available:size.available

});

});

});

Object.keys(matrix).forEach(size => {

matrix[size].push({

store:"ARKnets",

available:item.arkHit

});

matrix[size].push({

store:"CIACURA",

available:item.ciaHit

});

});

return matrix;

}

async function loadProducts(brand){

document
.getElementById("products")
.innerHTML = `

<div class="loading">

<div class="spinner"></div>

Loading...

</div>

`;

const res =
await fetch(
`./api/test?store=coverchord&brand=${brand}`
);

const data =
await res.json();

const products =
await Promise.all(

data.products
.slice(0,30)
.map(async item => {

const sizeRes =
await fetch(
"./api/product?handle=" +
item.handle
);

const sizeData =
await sizeRes.json();

const arkRes =
await fetch(
`./api/test?store=arknets&brand=${encodeURIComponent(item.title)}`
);

const arkData =
await arkRes.json();

const inStock =
sizeData.sizes.some(
size => size.available
);

return {

...item,

inStock,

arkHit:
arkData.hasBrand,

ciaHit:true,

matchKey:
createMatchKey(
item.title
),

sizes:
sizeData.sizes

};

})

);

allProducts =
groupProducts(products);

renderProducts();

}

function renderProducts(){

const stockOnly =
document
.getElementById("stockOnly")
.checked;

let products =
allProducts;

if(stockOnly){

products =
products.filter(
product => product.inStock
);

}

const html =
products.map((item,index) => {

const matrix =
buildSizeMatrix(item);

const sizeHtml =
Object.entries(matrix)
.map(([size,stores]) => {

const rows =
stores.map(store => {

return `

<div class="storeRow">

<div class="storeName">

${store.store}

</div>

<div class="${
store.available
? "ok"
: "ng"
}">

${
store.available
? "○"
: "×"
}

</div>

</div>

`;

}).join("");

return `

<div class="sizeBlock">

<div class="sizeTitle">

${size}

</div>

${rows}

</div>

`;

})
.join("");

return `

<div class="card">

<div class="imageWrap">

<img src="${item.images?.[0]?.src || ''}">

${
item.inStock
? `
<div class="stockBadge">
IN STOCK
</div>
`
: ""
}

</div>

<div class="info">

<div class="brand">

${item.vendor}

</div>

<div class="name">

${item.title}

</div>

<div class="price">

¥${Number(item.variants?.[0]?.price || 0).toLocaleString()}

</div>

<button
class="toggle"
onclick="toggleDetail(${index})"
>

SIZE STOCK ▼

</button>

<div
id="detail-${index}"
class="detail"
>

${sizeHtml}

<a
class="link"
href="https://www.google.com/search?q=${encodeURIComponent(item.title)}"
target="_blank"
>

他店舗検索

</a>

</div>

</div>

</div>

`;

}).join("");

document
.getElementById("products")
.innerHTML =
html;

}

function toggleDetail(index){

document
.getElementById(
"detail-" + index
)
.classList
.toggle("open");

}

document
.getElementById("search")
.addEventListener("change", e => {

loadProducts(
normalizeBrand(
e.target.value.trim()
)
);

});

document
.getElementById("search")
.addEventListener("focus", e => {

e.target.select();

});

document
.getElementById("stockOnly")
.addEventListener("change", () => {

renderProducts();

});

loadProducts("comoli");

</script>

</body>
</html>
