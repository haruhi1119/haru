<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BRAND STOCK</title>

<style>

body{
  margin:0;
  background:#f5f5f5;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  color:#111;
}

header{
  background:white;
  padding:40px 20px 24px;
  position:sticky;
  top:0;
  z-index:100;
  border-bottom:1px solid #eee;
}

.logo{
  font-size:42px;
  font-weight:900;
  letter-spacing:4px;
  text-align:center;
  margin-bottom:18px;
}

.search{
  width:100%;
  box-sizing:border-box;
  border:none;
  background:#f2f2f2;
  border-radius:16px;
  padding:18px;
  font-size:18px;
}

.filter{
  margin-top:14px;
  display:flex;
  align-items:center;
  gap:8px;
  font-size:14px;
}

.helper{
  margin-top:10px;
  text-align:center;
  color:#777;
  font-size:12px;
}

.container{
  padding:14px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
}

.card{
  background:white;
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 2px 10px rgba(0,0,0,.06);
}

.card img{
  width:100%;
  aspect-ratio:1/1.25;
  object-fit:cover;
}

.info{
  padding:14px;
}

.brand{
  font-size:11px;
  color:#888;
  margin-bottom:4px;
}

.name{
  font-size:14px;
  font-weight:700;
  line-height:1.45;
  margin-bottom:10px;
}

.price{
  font-size:18px;
  font-weight:800;
  margin-bottom:12px;
}

.toggle{
  width:100%;
  border:none;
  background:#f4f4f4;
  border-radius:12px;
  padding:12px;
  font-size:13px;
  font-weight:600;
}

.stores{
  display:none;
  margin-top:12px;
}

.stores.open{
  display:block;
}

.store{
  border-top:1px solid #eee;
  padding:12px 0;
}

.storeHeader{
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-size:13px;
  font-weight:700;
  margin-bottom:10px;
}

.storeSizes{
  display:flex;
  flex-direction:column;
  gap:6px;
}

.sizeRow{
  display:flex;
  justify-content:space-between;
  font-size:12px;
}

.ok{
  color:green;
  font-weight:700;
}

.sold{
  color:#999;
}

.link{
  display:block;
  margin-top:10px;
  background:black;
  color:white;
  text-decoration:none;
  text-align:center;
  padding:10px;
  border-radius:10px;
  font-size:12px;
}

.loading{
  padding:120px 20px;
  text-align:center;
  font-size:20px;
  grid-column:1/3;
}

</style>
</head>

<body>

<header>

<div class="logo">
BRAND STOCK
</div>

<input
  id="search"
  class="search"
  placeholder="ブランド検索"
  value="comoli"
/>

<div class="filter">

  <input
    type="checkbox"
    id="stockOnly"
  >

  <label for="stockOnly">

    在庫ありのみ表示

  </label>

</div>

<div class="helper">
商品横断在庫検索
</div>

</header>

<div
  id="products"
  class="container"
>

<div class="loading">
Loading...
</div>

</div>

<script>

let currentProducts = [];

function normalizeBrand(input){

  const map = {

    "コモリ":"comoli",
    "オーラリー":"auralee",
    "ヘリル":"herill",
    "ブラームス":"blurhms"

  };

  return (
    map[input]
    || input.toLowerCase()
  );

}

async function loadProducts(brand){

  document
  .getElementById("products")
  .innerHTML = `

    <div class="loading">

      ${brand.toUpperCase()}
      loading...

    </div>

  `;

  const res =
    await fetch(
      `./api/test?store=coverchord&brand=${brand}`
    );

  const data =
    await res.json();

  const products =
    await Promise.all(

      data.products
      .slice(0,12)
      .map(async item => {

        const sizeRes =
          await fetch(
            "./api/product?handle=" +
            item.handle
          );

        const sizeData =
          await sizeRes.json();

        return {

          ...item,

          sizes:
            sizeData.sizes

        };

      })

    );

  currentProducts = products;

  renderProducts();

}

function renderProducts(){

  const stockOnly =
    document
    .getElementById("stockOnly")
    .checked;

  let products =
    currentProducts;

  if(stockOnly){

    products =
      products.filter(product => {

        return product.sizes.some(
          size => size.available
        );

      });

  }

  const cards =
    products.map((item,index) => {

      const sizesHtml =
        item.sizes.map(size => {

          return `

            <div class="sizeRow">

              <div>
                ${size.title}
              </div>

              <div class="${
                size.available
                ? "ok"
                : "sold"
              }">

                ${
                  size.available
                  ? "○"
                  : "×"
                }

              </div>

            </div>

          `;

        }).join("");

      return `

        <div class="card">

          <img src="${item.image}">

          <div class="info">

            <div class="brand">
              COVERCHORD
            </div>

            <div class="name">
              ${item.title}
            </div>

            <div class="price">
              ¥${Number(item.price).toLocaleString()}
            </div>

            <button
              class="toggle"
              onclick="toggleStore(${index})"
            >

              STORE / SIZE ▼

            </button>

            <div
              id="store-${index}"
              class="stores"
            >

              <div class="store">

                <div class="storeHeader">

                  <div>
                    COVERCHORD
                  </div>

                  <div>
                    STOCK
                  </div>

                </div>

                <div class="storeSizes">

                  ${sizesHtml}

                </div>

                <a
                  class="link"
                  href="https://coverchord.com/products/${item.handle}"
                  target="_blank"
                >

                  商品を見る

                </a>

              </div>

            </div>

          </div>

        </div>

      `;

    }).join("");

  document
  .getElementById("products")
  .innerHTML =
    cards;

}

function toggleStore(index){

  document
  .getElementById(
    "store-" + index
  )
  .classList
  .toggle("open");

}

document
.getElementById("search")
.addEventListener("change", e => {

  const input =
    e.target.value.trim();

  const brand =
    normalizeBrand(input);

  loadProducts(brand);

});

document
.getElementById("stockOnly")
.addEventListener("change", () => {

  renderProducts();

});

loadProducts("comoli");

</script>

</body>
</html>
