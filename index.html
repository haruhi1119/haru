<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>COMOLI STOCK</title>

<style>

body{
  margin:0;
  font-family:sans-serif;
  background:#f5f5f5;
}

header{
  background:white;
  padding:40px 20px;
  text-align:center;
  position:sticky;
  top:0;
  z-index:10;
  border-bottom:1px solid #ddd;
}

h1{
  font-size:56px;
  letter-spacing:10px;
  margin:0 0 20px;
}

.search{
  width:100%;
  max-width:420px;
  padding:14px;
  border-radius:12px;
  border:1px solid #ccc;
  font-size:16px;
}

#products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:24px;
  padding:30px;
}

.card{
  background:white;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.card img{
  width:100%;
  height:420px;
  object-fit:cover;
}

.card-content{
  padding:20px;
}

.brand{
  color:#777;
  margin-bottom:10px;
}

.name{
  font-size:30px;
  font-weight:bold;
  margin-bottom:20px;
}

.stock{
  color:green;
  font-size:24px;
  font-weight:bold;
  margin-bottom:20px;
}

.button{
  display:block;
  background:black;
  color:white;
  text-decoration:none;
  text-align:center;
  padding:16px;
  border-radius:12px;
}

</style>
</head>

<body>

<header>

<h1>COMOLI</h1>

<input
id="search"
class="search"
type="text"
placeholder="ブランド検索"
/>

</header>

<div id="products"></div>

<script>

let allProducts = []

fetch("products.json")
.then(res => res.json())
.then(data => {

  allProducts = data

  renderProducts(data)

})

function renderProducts(items){

  const products = document.getElementById("products")

  products.innerHTML = ""

  items.forEach(item => {

    products.innerHTML += `

    <div class="card">

      <img src="${item.image}" />

      <div class="card-content">

        <div class="brand">
          ${item.brand}
        </div>

        <div class="name">
          ${item.name}
        </div>

        <div class="stock">
          在庫あり ${item.stock}店舗
        </div>

        <a
          class="button"
          href="${item.url}"
          target="_blank"
        >
          在庫店舗を見る
        </a>

      </div>

    </div>

    `

  })

}

document
.getElementById("search")
.addEventListener("input", e => {

  const keyword = e.target.value.toLowerCase()

  const filtered = allProducts.filter(item => {

    return (
      item.brand.toLowerCase().includes(keyword)
      ||
      item.name.toLowerCase().includes(keyword)
    )

  })

  renderProducts(filtered)

})

</
