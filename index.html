<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BRAND STOCK</title>

<style>

body{
  margin:0;
  background:#f5f5f5;
  font-family:sans-serif;
  color:#111;
}

header{
  background:white;
  padding:50px 20px 30px;
  text-align:center;
  border-bottom:1px solid #ddd;
}

.logo{
  font-size:72px;
  font-weight:900;
  letter-spacing:10px;
  margin-bottom:25px;
}

.search{
  width:100%;
  max-width:700px;
  padding:18px;
  border-radius:18px;
  border:1px solid #ccc;
  font-size:20px;
  box-sizing:border-box;
}

.container{
  max-width:1200px;
  margin:auto;
  padding:30px 20px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
  gap:24px;
}

.card{
  background:white;
  border-radius:22px;
  overflow:hidden;
  box-shadow:0 2px 14px rgba(0,0,0,.08);
}

.card img{
  width:100%;
  height:420px;
  object-fit:cover;
}

.info{
  padding:22px;
}

.brand{
  color:#888;
  font-size:15px;
  margin-bottom:8px;
}

.name{
  font-size:28px;
  font-weight:bold;
  line-height:1.4;
  margin-bottom:18px;
}

.price{
  font-size:22px;
  font-weight:bold;
  margin-bottom:14px;
}

.stock{
  color:green;
  font-size:26px;
  font-weight:bold;
}

.button{
  display:block;
  margin-top:22px;
  background:black;
  color:white;
  text-decoration:none;
  text-align:center;
  padding:18px;
  border-radius:16px;
  font-size:18px;
}

.loading{
  text-align:center;
  padding:80px 20px;
  font-size:22px;
}

</style>
</head>

<body>

<header>

<div class="logo">
BRAND STOCK
</div>

<input
  id="search"
  class="search"
  placeholder="ブランド・商品名で検索"
/>

</header>

<div id="products" class="container">
  <div class="loading">
    商品取得中...
  </div>
</div>

<script>

let allProducts = [];

fetch("./api/test")
.then(res => res.json())
.then(data => {

  allProducts = data.products.map(item => {

    return {

      brand: "COMOLI",

      name: item.title,

      image: item.image,

      price: "¥" + Number(item.price).toLocaleString(),

      url:
        "https://coverchord.com/products/" +
        item.handle

    };

  });

  renderProducts(allProducts);

});

function renderProducts(products){

  const container =
    document.getElementById("products");

  container.innerHTML = "";

  products.forEach(product => {

    container.innerHTML += `

      <div class="card">

        <img src="${product.image}">

        <div class="info">

          <div class="brand">
            ${product.brand}
          </div>

          <div class="name">
            ${product.name}
          </div>

          <div class="price">
            ${product.price}
          </div>

          <div class="stock">
            在庫確認可能
          </div>

          <a
            class="button"
            href="${product.url}"
            target="_blank"
          >
            商品ページを見る
          </a>

        </div>

      </div>

    `;

  });

}

document
.getElementById("search")
.addEventListener("input", e => {

  const keyword =
    e.target.value.toLowerCase();

  const filtered =
    allProducts.filter(product => {

      return (
        product.name
        .toLowerCase()
        .includes(keyword)
      );

    });

  renderProducts(filtered);

});

</script>

</body>
</html>
