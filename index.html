<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BRAND STOCK</title>

<style>

body{
  margin:0;
  background:#f5f5f5;
  font-family:sans-serif;
  color:#111;
}

header{
  background:white;
  padding:50px 20px 30px;
  text-align:center;
  border-bottom:1px solid #ddd;
}

.logo{
  font-size:72px;
  font-weight:900;
  letter-spacing:10px;
  margin-bottom:25px;
}

.container{
  max-width:900px;
  margin:auto;
  padding:30px 20px;
}

.card{
  background:white;
  border-radius:22px;
  overflow:hidden;
  box-shadow:0 2px 14px rgba(0,0,0,.08);
}

.card img{
  width:100%;
  height:500px;
  object-fit:cover;
}

.info{
  padding:24px;
}

.brand{
  color:#888;
  margin-bottom:8px;
}

.name{
  font-size:32px;
  font-weight:bold;
  margin-bottom:18px;
  line-height:1.4;
}

.price{
  font-size:24px;
  font-weight:bold;
  margin-bottom:22px;
}

.size-title{
  font-size:14px;
  color:#666;
  margin-bottom:12px;
}

.size{
  display:flex;
  justify-content:space-between;
  padding:14px 0;
  border-top:1px solid #eee;
  font-size:18px;
}

.ok{
  color:green;
  font-weight:bold;
}

.sold{
  color:#999;
}

.button{
  display:block;
  margin-top:26px;
  background:black;
  color:white;
  text-decoration:none;
  text-align:center;
  padding:18px;
  border-radius:16px;
  font-size:18px;
}

</style>
</head>

<body>

<header>

<div class="logo">
COMOLI
</div>

</header>

<div class="container">

<div id="product"></div>

</div>

<script>

async function loadProduct(){

  const listRes =
    await fetch("./api/test");

  const listData =
    await listRes.json();

  const item =
    listData.products[1];

  const sizeRes =
    await fetch(
      "./api/product?handle=" +
      item.handle
    );

  const sizeData =
    await sizeRes.json();

  const sizesHtml =
    sizeData.sizes.map(size => {

      return `

        <div class="size">

          <div>
            ${size.title}
          </div>

          <div class="${
            size.available
            ? "ok"
            : "sold"
          }">

            ${
              size.available
              ? "在庫あり"
              : "SOLD OUT"
            }

          </div>

        </div>

      `;

    }).join("");

  document
  .getElementById("product")
  .innerHTML = `

    <div class="card">

      <img src="${item.image}">

      <div class="info">

        <div class="brand">
          COMOLI
        </div>

        <div class="name">
          ${item.title}
        </div>

        <div class="price">
          ¥${Number(item.price).toLocaleString()}
        </div>

        <div class="size-title">
          SIZE STOCK
        </div>

        ${sizesHtml}

        <a
          class="button"
          href="https://coverchord.com/products/${item.handle}"
          target="_blank"
        >
          商品ページを見る
        </a>

      </div>

    </div>

  `;

}

loadProduct();

</script>

</body>
</html>
