<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BRAND STOCK</title>

<style>

body{
  margin:0;
  background:#f5f5f5;
  font-family:sans-serif;
  color:#111;
}

header{
  background:white;
  padding:48px 20px 28px;
  text-align:center;
  border-bottom:1px solid #ddd;
  position:sticky;
  top:0;
  z-index:100;
}

.logo{
  font-size:54px;
  font-weight:900;
  letter-spacing:6px;
  margin-bottom:22px;
}

.search{
  width:100%;
  max-width:700px;
  padding:18px;
  border-radius:18px;
  border:1px solid #ccc;
  font-size:20px;
  box-sizing:border-box;
}

.helper{
  margin-top:12px;
  color:#666;
  font-size:13px;
}

.container{
  padding:16px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
}

.card{
  background:white;
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.card img{
  width:100%;
  aspect-ratio:1/1.2;
  object-fit:cover;
}

.info{
  padding:14px;
}

.brand{
  color:#888;
  font-size:12px;
  margin-bottom:4px;
}

.name{
  font-size:15px;
  font-weight:bold;
  line-height:1.4;
  margin-bottom:10px;
}

.price{
  font-size:18px;
  font-weight:bold;
  margin-bottom:14px;
}

.toggle{
  width:100%;
  border:none;
  background:#f2f2f2;
  border-radius:12px;
  padding:12px;
  text-align:left;
  font-size:13px;
  margin-bottom:10px;
}

.stores{
  display:none;
}

.stores.open{
  display:block;
}

.storeBlock{
  border-top:1px solid #eee;
  padding:12px 0;
}

.storeName{
  font-size:13px;
  font-weight:bold;
  margin-bottom:10px;
}

.size{
  display:flex;
  justify-content:space-between;
  padding:6px 0;
  font-size:12px;
}

.ok{
  color:green;
  font-weight:bold;
}

.sold{
  color:#999;
}

.storeButton{
  display:block;
  margin-top:10px;
  background:black;
  color:white;
  text-decoration:none;
  text-align:center;
  padding:12px;
  border-radius:12px;
  font-size:13px;
}

.loading{
  text-align:center;
  padding:100px 20px;
  font-size:22px;
}

</style>
</head>

<body>

<header>

<div class="logo">
BRAND STOCK
</div>

<input
  id="search"
  class="search"
  placeholder="ブランド検索"
  value="comoli"
/>

<div class="helper">
商品横断在庫検索
</div>

</header>

<div
  id="products"
  class="container"
>

  <div class="loading">
    商品取得中...
  </div>

</div>

<script>

function normalizeBrand(input){

  const map = {

    "コモリ": "comoli",
    "オーラリー": "auralee",
    "ヘリル": "herill",
    "ブラームス": "blurhms"

  };

  return (
    map[input]
    || input.toLowerCase()
  );

}

function normalizeTitle(title){

  return title

    .toLowerCase()

    .replace(/\s/g,"")

    .replace(/-/g,"")

    .replace(/_/g,"")

    .replace(/\//g,"")

    .replace(/black/g,"")

    .replace(/white/g,"")

    .replace(/charcoal/g,"")

    .replace(/navy/g,"")

    .replace(/beige/g,"")

    .replace(/gray/g,"")

    .replace(/brown/g,"")

    .replace(/green/g,"");

}

async function loadProducts(brand){

  document
  .getElementById("products")
  .innerHTML = `

    <div class="loading">

      ${brand.toUpperCase()}
      を取得中...

    </div>

  `;

  const stores = [

    {
      id: "coverchord",
      type: "shopify"
    },

    {
      id: "ciacura",
      type: "search"
    }

  ];

  let merged = {};

  for(const store of stores){

    const res =
      await fetch(

        `./api/test?store=${store.id}&brand=${brand}`

      );

    const data =
      await res.json();

    if(store.type === "shopify"){

      data.products.forEach(product => {

        const key =
          normalizeTitle(product.title);

        if(!merged[key]){

          merged[key] = {

            title:
              product.title,

            image:
              product.image,

            price:
              product.price,

            stores: []

          };

        }

        merged[key]
        .stores
        .push({

          store:
            store.id,

          handle:
            product.handle

        });

      });

    }

    if(store.type === "search"){

      const key =
        "ciacura-search";

      if(!merged[key]){

        merged[key] = {

          title:
            "CIACURA SEARCH",

          image:
            "",

          price:
            "",

          stores: []

        };

      }

      merged[key]
      .stores
      .push({

        store:
          "ciacura",

        searchUrl:
          data.searchUrl

      });

    }

  }

  const mergedProducts =
    Object.values(merged);

  const cards =
    await Promise.all(

      mergedProducts
      .slice(0,12)
      .map(async (item,index) => {

        let storesHtml = "";

        for(const store of item.stores){

          if(store.store === "coverchord"){

            const sizeRes =
              await fetch(

                "./api/product?handle=" +
                store.handle

              );

            const sizeData =
              await sizeRes.json();

            const sizesHtml =
              sizeData.sizes.map(size => {

                return `

                  <div class="size">

                    <div>
                      ${size.title}
                    </div>

                    <div class="${
                      size.available
                      ? "ok"
                      : "sold"
                    }">

                      ${
                        size.available
                        ? "在庫あり"
                        : "SOLD"
                      }

                    </div>

                  </div>

                `;

              }).join("");

            storesHtml += `

              <div class="storeBlock">

                <div class="storeName">

                  COVERCHORD

                </div>

                ${sizesHtml}

                <a
                  class="storeButton"
                  href="https://coverchord.com/products/${store.handle}"
                  target="_blank"
                >

                  COVERCHORDで見る

                </a>

              </div>

            `;

          }

          if(store.store === "ciacura"){

            storesHtml += `

              <div class="storeBlock">

                <div class="storeName">

                  CIACURA

                </div>

                <a
                  class="storeButton"
                  href="${store.searchUrl}"
                  target="_blank"
                >

                  CIACURAで検索

                </a>

              </div>

            `;

          }

        }

        return `

          <div class="card">

            ${
              item.image
              ? `<img src="${item.image}">`
              : ""
            }

            <div class="info">

              <div class="brand">

                ${brand.toUpperCase()}

              </div>

              <div class="name">

                ${item.title}

              </div>

              ${
                item.price
                ? `
                  <div class="price">
                    ¥${Number(item.price).toLocaleString()}
                  </div>
                `
                : ""
              }

              <button
                class="toggle"
                onclick="toggleStores(${index})"
              >

                STORE / SIZE ▼

              </button>

              <div
                id="stores-${index}"
                class="stores"
              >

                ${storesHtml}

              </div>

            </div>

          </div>

        `;

      })

    );

  document
  .getElementById("products")
  .innerHTML =
    cards.join("");

}

function toggleStores(index){

  document
  .getElementById(
    "stores-" + index
  )
  .classList
  .toggle("open");

}

document
.getElementById("search")
.addEventListener("change", e => {

  const input =
    e.target.value.trim();

  const brand =
    normalizeBrand(input);

  loadProducts(brand);

});

loadProducts("comoli");

</script>

</body>
</html>
