<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BRAND STOCK</title>

<style>

body{
  margin:0;
  background:#f5f5f5;
  font-family:sans-serif;
  color:#111;
}

header{
  background:white;
  padding:50px 20px 30px;
  text-align:center;
  border-bottom:1px solid #ddd;
}

.logo{
  font-size:72px;
  font-weight:900;
  letter-spacing:10px;
  margin-bottom:25px;
}

.search{
  width:100%;
  max-width:700px;
  padding:18px;
  border-radius:18px;
  border:1px solid #ccc;
  font-size:20px;
  box-sizing:border-box;
}

.container{
  max-width:1200px;
  margin:auto;
  padding:30px 20px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
  gap:24px;
}

.card{
  background:white;
  border-radius:22px;
  overflow:hidden;
  box-shadow:0 2px 14px rgba(0,0,0,.08);
}

.card img{
  width:100%;
  height:420px;
  object-fit:cover;
}

.info{
  padding:22px;
}

.brand{
  color:#888;
  font-size:15px;
  margin-bottom:8px;
}

.name{
  font-size:32px;
  font-weight:bold;
  line-height:1.4;
  margin-bottom:18px;
}

.meta{
  color:#666;
  font-size:15px;
  line-height:1.8;
}

.stock{
  margin-top:18px;
  color:green;
  font-size:30px;
  font-weight:bold;
}

.button{
  display:block;
  margin-top:22px;
  background:black;
  color:white;
  text-decoration:none;
  text-align:center;
  padding:18px;
  border-radius:16px;
  font-size:18px;
}

</style>
</head>

<body>

<header>

<div class="logo">
BRAND STOCK
</div>

<input
  id="search"
  class="search"
  placeholder="ブランド・商品名・型番で検索"
/>

</header>

<div id="products" class="container"></div>

<script>

let allProducts = [];

fetch("./products.json")
.then(res => res.json())
.then(data => {

  allProducts = data;

  renderProducts(data);

});

function renderProducts(products){

  const container = document.getElementById("products");

  container.innerHTML = "";

  products.forEach(product => {

    container.innerHTML += `

      <div class="card">

        <img src="${product.image}">

        <div class="info">

          <div class="brand">
            ${product.brand}
          </div>

          <div class="name">
            ${product.name}
          </div>

          <div class="meta">
            Season：${product.season}<br>
            Code：${product.code}<br>
            Price：${product.price}<br>
            Size：${product.size.join(" / ")}
          </div>

          <div class="stock">
            在庫あり ${product.stock}店舗
          </div>

          <a class="button" href="./shop.html">
            在庫店舗を見る
          </a>

        </div>

      </div>

    `;

  });

}

document.getElementById("search")
.addEventListener("input", e => {

  const keyword = e.target.value.toLowerCase();

  const filtered = allProducts.filter(product => {

    return (
      product.brand.toLowerCase().includes(keyword)
      ||
      product.name.toLowerCase().includes(keyword)
      ||
      product.code.toLowerCase().includes(keyword)
    );

  });

  renderProducts(filtered);

});

</script>

</body>
</html>
