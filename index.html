<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BRAND STOCK</title>

<style>

body{
  margin:0;
  background:#f5f5f5;
  font-family:sans-serif;
  color:#111;
}

header{
  background:white;
  padding:40px 16px 24px;
  text-align:center;
  border-bottom:1px solid #ddd;
  position:sticky;
  top:0;
  z-index:100;
}

.logo{
  font-size:48px;
  font-weight:900;
  letter-spacing:6px;
  margin-bottom:18px;
}

.search{
  width:100%;
  max-width:700px;
  padding:16px;
  border-radius:16px;
  border:1px solid #ccc;
  font-size:18px;
  box-sizing:border-box;
}

.brand-buttons{
  margin-top:16px;
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  justify-content:center;
}

.brand-button{
  border:none;
  background:black;
  color:white;
  padding:10px 14px;
  border-radius:999px;
  font-size:13px;
}

.container{
  padding:16px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
}

.card{
  background:white;
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.card img{
  width:100%;
  aspect-ratio:1/1.2;
  object-fit:cover;
}

.info{
  padding:14px;
}

.brand{
  color:#888;
  font-size:12px;
  margin-bottom:4px;
}

.name{
  font-size:16px;
  font-weight:bold;
  line-height:1.4;
  margin-bottom:10px;
}

.price{
  font-size:18px;
  font-weight:bold;
  margin-bottom:14px;
}

.toggle{
  width:100%;
  border:none;
  background:#f2f2f2;
  border-radius:12px;
  padding:12px;
  text-align:left;
  font-size:13px;
  margin-bottom:10px;
}

.sizes{
  display:none;
}

.sizes.open{
  display:block;
}

.size{
  display:flex;
  justify-content:space-between;
  padding:8px 0;
  border-top:1px solid #eee;
  font-size:12px;
}

.ok{
  color:green;
  font-weight:bold;
}

.sold{
  color:#999;
}

.button{
  display:block;
  margin-top:14px;
  background:black;
  color:white;
  text-decoration:none;
  text-align:center;
  padding:14px;
  border-radius:14px;
  font-size:14px;
}

.loading{
  text-align:center;
  padding:100px 20px;
  font-size:22px;
  grid-column:1/3;
}

</style>
</head>

<body>

<header>

<div class="logo">
BRAND STOCK
</div>

<input
  id="search"
  class="search"
  placeholder="ブランド検索"
  value="comoli"
/>

<div class="brand-buttons">

<button class="brand-button"
onclick="changeBrand('comoli')">
COMOLI
</button>

<button class="brand-button"
onclick="changeBrand('auralee')">
AURALEE
</button>

<button class="brand-button"
onclick="changeBrand('herill')">
HERILL
</button>

<button class="brand-button"
onclick="changeBrand('niceness')">
NICENESS
</button>

<button class="brand-button"
onclick="changeBrand('graphpaper')">
Graphpaper
</button>

<button class="brand-button"
onclick="changeBrand('yoke')">
YOKE
</button>

<button class="brand-button"
onclick="changeBrand('stein')">
Stein
</button>

<button class="brand-button"
onclick="changeBrand('blurhms')">
blurhms
</button>

<button class="brand-button"
onclick="changeBrand('heugn')">
HEUGN
</button>

<button class="brand-button"
onclick="changeBrand('maatee-and-sons')">
MAATEE&SONS
</button>

</div>

</header>

<div
  id="products"
  class="container"
>
  <div class="loading">
    商品取得中...
  </div>
</div>

<script>

async function loadProducts(brand){

  document
  .getElementById("products")
  .innerHTML = `
    <div class="loading">
      ${brand.toUpperCase()}
      を取得中...
    </div>
  `;

  try {

    const listRes =
      await fetch(
        "./api/test?brand=" + brand
      );

    const listData =
      await listRes.json();

    const products =
      listData.products.slice(0, 12);

    const cards = await Promise.all(

      products.map(async (item,index) => {

        const sizeRes =
          await fetch(
            "./api/product?handle=" +
            item.handle
          );

        const sizeData =
          await sizeRes.json();

        const sizesHtml =
          sizeData.sizes.map(size => {

            return `

              <div class="size">

                <div>
                  ${size.title}
                </div>

                <div class="${
                  size.available
                  ? "ok"
                  : "sold"
                }">

                  ${
                    size.available
                    ? "在庫あり"
                    : "SOLD"
                  }

                </div>

              </div>

            `;

          }).join("");

        return `

          <div class="card">

            <img src="${item.image}">

            <div class="info">

              <div class="brand">
                ${brand.toUpperCase()}
              </div>

              <div class="name">
                ${item.title}
              </div>

              <div class="price">
                ¥${Number(item.price).toLocaleString()}
              </div>

              <button
                class="toggle"
                onclick="toggleSizes(${index})"
              >
                SIZE STOCK ▼
              </button>

              <div
                id="sizes-${index}"
                class="sizes"
              >

                ${sizesHtml}

              </div>

              <a
                class="button"
                href="https://coverchord.com/products/${item.handle}"
                target="_blank"
              >
                商品を見る
              </a>

            </div>

          </div>

        `;

      })

    );

    document
    .getElementById("products")
    .innerHTML =
      cards.join("");

  } catch(error){

    document
    .getElementById("products")
    .innerHTML = `
      <div class="loading">
        商品取得失敗
      </div>
    `;

  }

}

function toggleSizes(index){

  document
  .getElementById(
    "sizes-" + index
  )
  .classList
  .toggle("open");

}

function changeBrand(brand){

  document
  .getElementById("search")
  .value = brand;

  loadProducts(brand);

}

document
.getElementById("search")
.addEventListener("change", e => {

  loadProducts(
    e.target.value.toLowerCase()
  );

});

loadProducts("comoli");

</script>

</body>
</html>
