<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COVERCHORD取得テスト</title>
<style>
body{font-family:sans-serif;background:#f5f5f5;padding:20px}
h1{font-size:24px}
button{padding:14px 20px;border:0;border-radius:10px;background:#000;color:#fff;font-size:16px}
pre{background:#fff;padding:16px;border-radius:12px;white-space:pre-wrap;margin-top:20px}
</style>
</head>
<body>

<h1>COVERCHORD取得テスト</h1>
<button onclick="check()">取得テスト</button>
<pre id="result">ここに結果が表示されます</pre>

<script>
async function check(){
  const result = document.getElementById("result");
  result.textContent = "取得中...";

  try{
    const url = "https://coverchord.com/collections/comoli";
    const res = await fetch(url);
    const text = await res.text();

    result.textContent =
      "取得成功\n\n" +
      "文字数: " + text.length + "\n\n" +
      text.slice(0, 1000);
  }catch(e){
    result.textContent =
      "取得失敗\n\n" +
      e.message + "\n\n" +
      "ブラウザから直接取得できない可能性があります。";
  }
}
</script>

</body>
</html>
